x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: books_store_db
    restart: unless-stopped
    # Credentials come from .env so the DB and the app always agree.
    environment:
      POSTGRES_DB: ${DB_NAME:-books_store}
      POSTGRES_USER: ${DB_USER:-books}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-books}
    # Bound to 127.0.0.1 so the DB is reachable for local psql/GUI but NEVER
    # exposed to the internet. The bot reaches it over the internal network.
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # NB: schema is created by the app (SQLAlchemy models via init_db /
      # create_all) — the single source of truth. We deliberately do NOT mount
      # sql/init.sql here so the DB schema can never drift from the models.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-books} -d ${DB_NAME:-books_store}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  bot:
    build: .
    container_name: books_store_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 384M

  # One-shot helper to (re)load store data. Opt-in via a Compose profile so it
  # never runs as part of `docker compose up`. Examples:
  #   docker compose run --rm seed                               # random test data
  #   docker compose run --rm seed python -m scripts.import_sheet --reset
  seed:
    build: .
    profiles: ["tools"]
    command: python -m scripts.seed
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
